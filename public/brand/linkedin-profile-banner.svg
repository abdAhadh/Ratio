<svg width="1584" height="396" viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg">
  <!-- Cream background -->
  <rect width="1584" height="396" fill="#FBF7F1"/>

  <!--
    Personal profile avatar circle (~250px diameter) overlaps bottom-left
    at roughly x=80 to x=330, y=200 to y=450. Center content + push right
    of that overlap on smaller viewports. We also nudge the headline a
    touch right of center so it visually balances against the avatar
    appearing on the lower-left at desktop crop.
  -->
  <g transform="translate(792, 162)">
    <text
      x="0"
      y="0"
      text-anchor="middle"
      font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
      font-size="68"
      font-weight="700"
      letter-spacing="-1"
      fill="#1A1A2E"
    >AI workforce for finance teams.</text>

    <text
      x="0"
      y="56"
      text-anchor="middle"
      font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
      font-size="26"
      font-weight="500"
      letter-spacing="0"
      fill="#1A1A2E"
      opacity="0.6"
    >AI agents that run accounts payable and receivable, end-to-end.</text>
  </g>

  <!-- Domain mark, bottom-right — same restraint as the company banner. -->
  <text
    x="1530"
    y="362"
    text-anchor="end"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="18"
    font-weight="500"
    letter-spacing="0.5"
    fill="#1A1A2E"
    opacity="0.5"
  >tryratio.io</text>
</svg>
